# src/main/resources/application.properties
# Application name (shown in logs)
spring.application.name=webhook-submission

# Port (default 8080, change if needed)
server.port=8080

# Show full log output including INFO level
logging.level.root=INFO
logging.level.com.webhook.submission=DEBUG

# Pretty-print JSON in logs (optional, for readability)
spring.jackson.serialization.indent-output=true